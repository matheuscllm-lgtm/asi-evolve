# ASI-Evolve config — comc_tiers experiment
# Overrides the repo-root config.yaml for this experiment only.
experiment_name: "comc_tiers"

# -----------------------------------------------------------------------------
# API: FILL THESE IN before running. ASI-Evolve uses an OpenAI-compatible client.
# Options:
#   - A hosted OpenAI-compatible endpoint (OpenAI, Together, Fireworks, DeepInfra…)
#   - A local server (sglang / vLLM / Ollama's OpenAI shim) at e.g. http://localhost:30000/v1
# Without a reachable endpoint + key + model, the evolution loop cannot run.
# (You can read api_key from the environment with ${ENV_VAR}.)
# -----------------------------------------------------------------------------
api:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"   # env var (persisted, User scope) — never commit a literal key
  model: "gpt-4o"
  temperature: 0.6
  top_p: 0.95
  max_tokens: 16384
  seed: 42
  timeout: 300
  retry_times: 3
  retry_delay: 5

logging:
  level: "INFO"
  console: true
  wandb:
    enabled: false   # offline-friendly; flip on if you use W&B

pipeline:
  agents:
    manager: false
    researcher: true
    engineer: true
    analyzer: true
  researcher:
    diff_based_evolution: false   # small single-function target -> full rewrites are simplest
    max_code_length: 20000
  max_retries:
    researcher: 3
    engineer: 2
    analyzer: 2
  engineer_timeout: 120           # offline eval is fast
  parallel:
    num_workers: 1                # bump to 2-4 once it's working
  sample_n: 3
  judge:
    enabled: false

cognition:
  storage_dir: "cognition_data"
  embedding:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    dimension: 384
  faiss:
    index_type: "IP"
  retrieval:
    top_k: 5
    score_threshold: 0.3

database:
  storage_dir: "database_data"
  max_size: 50
  embedding:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    dimension: 384
  sampling:
    algorithm: "ucb1"
    ucb1_c: 1.414
  faiss:
    index_type: "IP"
